name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Ruff
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Mypy
        run: mypy src/dnd_combat_simulator
      - name: Pytest
        run: pytest -q
      - name: Coverage
        run: pytest --cov=src/dnd_combat_simulator --cov-branch --cov-report=term-missing
